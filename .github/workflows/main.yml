name: Facebook Auto Poster

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # تم التحديث من v3 إلى v4

      - name: Setup Python
        uses: actions/setup-python@v5 # تم التحديث من v4 إلى v5
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install -r requirements.txt

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
        run: python bot.py
        
